name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deterministic test suite
        # No ANTHROPIC_API_KEY: these tests inject a fake LLM provider and
        # never call the real Anthropic API. Evaluations (evaluations/) are
        # non-deterministic and cost tokens, so they stay a local/manual
        # step, not a CI gate.
        run: python src/manage.py test gaps
